<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>HANCOM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f1724;--card:#1a2332;--card2:#212f42;
  --tx:#edf2ff;--tx2:#8899b0;--tx3:#3d4f65;
  --ac:#4f8ef7;--gn:#10b981;--rd:#ef4444;--og:#f59e0b;--pu:#8b5cf6;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.13);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;}
body{padding-bottom:calc(80px + env(safe-area-inset-bottom));overflow-x:hidden;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bd);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 7px;cursor:pointer;border:none;background:none;color:var(--tx2);font-family:'Inter',sans-serif;transition:color .12s;font-size:9px;gap:3px;}
.bn .bi{font-size:20px;}
.bn.on{color:var(--ac);}

/* ── SCREEN ── */
.sc{display:none;padding:14px 14px calc(70px + env(safe-area-inset-bottom));}
.sc.on{display:block;}
@keyframes fin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.sc.on{animation:fin .18s ease;}

/* ── HEADER ── */
.phdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.phdr-back{background:none;border:none;color:var(--ac);font-size:22px;cursor:pointer;padding:0 6px 0 0;}
.phdr-title{font-size:16px;font-weight:800;flex:1;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--bd);border-radius:13px;margin-bottom:11px;}
.card-hdr{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;}
.card-title{font-size:13px;font-weight:700;flex:1;}
.card-body{padding:13px 14px;}

/* ── STAT GRID ── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.scard{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,linear-gradient(90deg,var(--ac),var(--pu)));}
.scard.gn::before{background:linear-gradient(90deg,var(--gn),#34d399);}
.scard.og::before{background:linear-gradient(90deg,var(--og),#fbbf24);}
.scard.rd::before{background:linear-gradient(90deg,var(--rd),#f87171);}
.sv{font-size:26px;font-weight:800;line-height:1;margin-bottom:3px;}
.sl{font-size:10px;color:var(--tx2);}
.si{font-size:18px;margin-bottom:6px;}

/* ── SCHEDULE ── */
.sch-card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:9px;}
.sch-card.today{border-color:rgba(79,142,247,.35);background:linear-gradient(135deg,rgba(79,142,247,.06),rgba(139,92,246,.04));}
.sch-name{font-size:14px;font-weight:700;margin-bottom:5px;}
.sch-meta{font-size:11px;color:var(--tx2);margin-bottom:7px;}
.dtag{font-size:9px;padding:2px 8px;border-radius:20px;background:rgba(79,142,247,.1);color:var(--ac);border:1px solid rgba(79,142,247,.2);display:inline-block;margin:2px;}
.dtag.act{background:rgba(16,185,129,.15);color:#34d399;border-color:rgba(16,185,129,.25);}

/* ── GROUP LIST ── */
.grp-item{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;}
.grp-item:last-child{border-bottom:none;}
.grp-item:active{background:rgba(255,255,255,.03);}
.gi-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
.gi-info{flex:1;min-width:0;}
.gi-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gi-meta{font-size:10px;color:var(--tx2);margin-top:2px;}
.gi-arr{color:var(--tx3);font-size:18px;}

/* ── BADGE ── */
.b{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;white-space:nowrap;}
.bit{background:rgba(79,142,247,.12);color:#4f8ef7;border:1px solid rgba(79,142,247,.25);}
.bkr{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.25);}
.bok{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25);}
.btd{background:rgba(79,142,247,.1);color:var(--ac);border:1px solid rgba(79,142,247,.2);}

/* ── STUDENT LIST ── */
.std-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--bd);}
.std-item:last-child{border-bottom:none;}
.std-num{width:26px;height:26px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--tx2);flex-shrink:0;}
.std-info{flex:1;min-width:0;}
.std-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.std-phone{font-size:10px;color:var(--tx2);}
.std-acts{display:flex;gap:5px;flex-shrink:0;}

/* ── PAYMENT ITEM ── */
.pay-item{padding:13px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;}
.pay-item:last-child{border-bottom:none;}
.pay-item:active{background:rgba(255,255,255,.02);}
.pay-item.paid{background:rgba(16,185,129,.04);}
.pay-top{display:flex;align-items:center;gap:9px;margin-bottom:5px;}
.pay-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:.12s;}
.pay-item.paid .pay-check{background:var(--gn);border-color:var(--gn);color:#fff;}
.pay-name{font-size:13px;font-weight:600;flex:1;}
.pay-amount{font-size:12px;font-weight:700;color:var(--gn);}
.pay-note{font-size:10px;color:var(--tx2);margin-left:35px;}

/* ── BUTTONS ── */
.btn{padding:8px 14px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap;}
.btn:active{transform:scale(.96);}
.bp{background:var(--ac);color:#fff;}
.bd{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25);}
.bs{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25);}
.bg{background:var(--card2);color:var(--tx2);border:1px solid var(--bd2);}
.bfull{width:100%;justify-content:center;padding:13px;font-size:13px;border-radius:12px;}

/* ── FORM ── */
.fg{margin-bottom:11px;}
.lbl{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);margin-bottom:5px;}
.inp{width:100%;background:var(--card2);border:1px solid var(--bd2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:13px;font-family:'Inter',sans-serif;outline:none;}
.inp:focus{border-color:var(--ac);}
select.inp{cursor:pointer;}
input[type=month].inp{color-scheme:dark;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd);}
.toggle-row:last-child{border-bottom:none;}
.toggle-lbl{font-size:12px;font-weight:600;}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.tslider{position:absolute;inset:0;background:var(--card2);border-radius:12px;cursor:pointer;transition:.2s;border:1px solid var(--bd2);}
.tslider:before{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s;}
input:checked+.tslider{background:var(--gn);border-color:var(--gn);}
input:checked+.tslider:before{transform:translateX(20px);}

/* ── PROFILE ── */
.prof-card{background:linear-gradient(135deg,rgba(79,142,247,.1),rgba(139,92,246,.08));border:1px solid rgba(79,142,247,.2);border-radius:16px;padding:20px;text-align:center;margin-bottom:13px;}
.prof-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin:0 auto 10px;}
.prof-name{font-size:18px;font-weight:800;margin-bottom:4px;}
.prof-spec{font-size:12px;color:var(--tx2);}

/* ── BRANCH ── */
.br-item{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--bd);}
.br-item:last-child{border-bottom:none;}
.br-num{width:32px;height:32px;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--ac);flex-shrink:0;}
.br-info{flex:1;}
.br-name{font-size:12px;font-weight:700;}
.br-coord{font-size:10px;color:var(--tx2);}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;z-index:9999 !important;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;padding:0;}
.overlay.open{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:88vh;overflow-y:auto;animation:mup .2s ease;}
@keyframes mup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:15px;font-weight:800;}
.modal-close{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;padding:0;}
.drag-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 14px;}

/* ── LOADER ── */
.ldr{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--tx2);}
.spin{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 16px;color:var(--tx2);}
.empty .ei{font-size:36px;margin-bottom:8px;}

/* ── TOAST ── */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-70px);background:#1e2d3d;border:1px solid var(--bd2);border-radius:10px;padding:9px 18px;font-size:12px;font-weight:500;z-index:9999;transition:.22s;max-width:90vw;text-align:center;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{border-color:rgba(239,68,68,.3);color:#f87171;}
.toast.ok{border-color:rgba(16,185,129,.3);color:#34d399;}

/* ── ATT HISTORY ── */
.att-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);gap:8px;}
.att-row:last-child{border-bottom:none;}
.att-date{font-size:11px;color:var(--tx2);width:55px;flex-shrink:0;}
.att-pct{font-size:11px;font-weight:700;margin-left:auto;}
</style>
</head>
<body>

<!-- ── SCREENS ── -->

<!-- STATS -->
<div class="sc on" id="sc-stats">
  <div class="ldr" id="stats-ld"><div class="spin"></div></div>
  <div id="stats-ct" style="display:none"></div>
</div>

<!-- SCHEDULE -->
<div class="sc" id="sc-schedule">
  <div class="ldr" id="sched-ld"><div class="spin"></div></div>
  <div id="sched-ct" style="display:none"></div>
</div>

<!-- GROUPS LIST -->
<div class="sc" id="sc-groups">
  <div class="ldr" id="grps-ld"><div class="spin"></div></div>
  <div id="grps-ct" style="display:none"></div>
</div>

<!-- GROUP DETAIL -->
<div class="sc" id="sc-grpdet">
  <div class="phdr">
    <button class="phdr-back" onclick="backToGroups()">‹</button>
    <div class="phdr-title" id="grpdet-title">Guruh</div>
  </div>
  <div id="grpdet-tabs" style="display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:13px;overflow-x:auto"></div>
  <div id="grpdet-ct"></div>
</div>

<!-- PROFILE -->
<div class="sc" id="sc-profile">
  <div class="ldr" id="prof-ld"><div class="spin"></div></div>
  <div id="prof-ct" style="display:none"></div>
</div>

<!-- BRANCHES -->
<div class="sc" id="sc-branches">
  <div class="ldr" id="br-ld"><div class="spin"></div></div>
  <div id="br-ct" style="display:none"></div>
</div>

<!-- SETTINGS -->
<div class="sc" id="sc-settings">
  <div id="settings-ct"></div>
</div>

<!-- ── BOTTOM NAV ── -->
<div class="bnav" id="bottom-nav">

<!-- ── MODALS ── -->
<!-- Add student -->
<div class="overlay" id="mod-addstd">
  <div class="modal">
    <div class="drag-handle"></div>
    <div class="modal-hdr"><span class="modal-title">➕ O'quvchi qo'shish</span><button class="modal-close" onclick="cMod('mod-addstd')">✕</button></div>
    <input type="hidden" id="as-gid">
    <div class="fg"><label class="lbl">Ism Familiya</label><input type="text" id="as-name" class="inp" placeholder="Abdullayev Sardor"></div>
    <div class="fg"><label class="lbl">Telefon raqam</label><input type="tel" id="as-phone" class="inp" placeholder="+998901234567"></div>
    <button class="btn bp bfull" onclick="doAddStd()" style="margin-top:4px">✅ Qo'shish</button>
  </div>
</div>

<!-- Payment modal -->
<div class="overlay" id="mod-pay">
  <div class="modal">
    <div class="drag-handle"></div>
    <div class="modal-hdr"><span class="modal-title" id="pay-modal-title">💰 To'lov</span><button class="modal-close" onclick="cMod('mod-pay')">✕</button></div>
    <input type="hidden" id="pm-gid">
    <input type="hidden" id="pm-name">
    <input type="hidden" id="pm-phone">
    <input type="hidden" id="pm-month">
    <div class="toggle-row">
      <span class="toggle-lbl">✅ To'lov qilindi</span>
      <label class="toggle"><input type="checkbox" id="pm-paid" onchange="pmToggle()"><span class="tslider"></span></label>
    </div>
    <div class="fg" id="pm-amount-row">
      <label class="lbl">Summa (so'm)</label>
      <input type="number" id="pm-amount" class="inp" placeholder="500000" min="0">
    </div>
    <div class="fg">
      <label class="lbl">Izoh (ixtiyoriy)</label>
      <input type="text" id="pm-note" class="inp" placeholder="Masalan: qisman to'ladi">
    </div>
    <button class="btn bp bfull" onclick="savePay()" style="margin-top:4px">💾 Saqlash</button>
  </div>
</div>

<!-- Edit profile modal -->
<div class="overlay" id="mod-editprof">
  <div class="modal">
    <div class="drag-handle"></div>
    <div class="modal-hdr"><span class="modal-title">✏️ Profilni tahrirlash</span><button class="modal-close" onclick="cMod('mod-editprof')">✕</button></div>
    <div class="fg"><label class="lbl">Ism Familiya</label><input type="text" id="ep-name" class="inp" placeholder="Abdullayev Sardor"></div>
    <div class="fg">
      <label class="lbl">Mutaxassislik</label>
      <select id="ep-spec" class="inp">
        <option value="IT">💻 IT</option>
        <option value="Koreys tili">📚 Koreys tili</option>
        <option value="Ofis xodimi">🏢 Ofis xodimi</option>
      </select>
    </div>
    <button class="btn bp bfull" onclick="saveProfile()" style="margin-top:4px">💾 Saqlash</button>
  </div>
</div>

<!-- Delete student confirm -->
<div class="overlay" id="mod-delstd">
  <div class="modal">
    <div class="drag-handle"></div>
    <div class="modal-hdr"><span class="modal-title">🗑 O'chirishni tasdiqlang</span><button class="modal-close" onclick="cMod('mod-delstd')">✕</button></div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:16px">
      <b id="del-std-name" style="color:var(--tx)"></b> o'quvchisi ro'yxatdan o'chiriladi. Davomat tarixi saqlanadi.
    </p>
    <div style="display:flex;gap:8px">
      <button class="btn bg bfull" onclick="cMod('mod-delstd')">Bekor</button>
      <button class="btn bd bfull" onclick="doDelStd()">🗑 O'chirish</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function showErr(msg){
  const el=document.getElementById('stats-ld');
  if(el)el.innerHTML=`<div class="empty"><div class="ei">❌</div>${msg}</div>`;
}

function toast(msg,type='',dur=2600){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>t.className='toast',dur);
}
function ini(n){if(!n)return'?';const p=n.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n[0].toUpperCase();}

// ── SCHEDULE ──
function renderSched(){
  try{
    if(!D)return;
    const schedLd=document.getElementById('sched-ld');
    const schedCt=document.getElementById('sched-ct');
    if(schedLd)schedLd.style.display='none';
    if(schedCt){
      schedCt.style.display='block';
      const today=D.today_day;
      const gs=D.groups||[];
      if(!gs.length){schedCt.innerHTML='<div class="empty"><div class="ei">📅</div>Hali guruh yo\'q</div>';return;}
      const todayGs=gs.filter(g=>g.is_today);
      const otherGs=gs.filter(g=>!g.is_today);
      let h='';
      if(todayGs.length){
        h+=`<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx2);margin-bottom:9px">⚡ Bugungi darslar (${today})</div>`;
        h+=todayGs.map(g=>schedCard(g,today,true)).join('');
      }
      if(otherGs.length){
        h+=`<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx2);margin:${todayGs.length?'14px':0} 0 9px">📚 Barcha jadval</div>`;
        h+=otherGs.map(g=>schedCard(g,today,false)).join('');
      }
      schedCt.innerHTML=h;
    }
  }catch(e){console.error('renderSched error:',e);}
}
function schedCard(g,today,isT){
  const tc=g.lesson_type==='IT'?'bit':'bkr';
  const daysH=(g.days||[]).map(d=>`<span class="dtag ${d===today&&isT?'act':''}">${d.slice(0,3)} ${g.day_times?.[d]||''}</span>`).join('');
  return`<div class="sch-card ${isT?'today':''}" onclick="openGrp(${g.id})">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px">
      <div class="sch-name">${g.group_name}</div>
      <span class="b ${tc}">${g.lesson_type}</span>
    </div>
    <div class="sch-meta">🏢 ${g.branch} &nbsp;·&nbsp; 🧑‍🎓 ${g.student_count} ta</div>
    <div>${daysH}</div>
  </div>`;
}

function renderAttView(){
  // Tugmalar rangini yangilaymiz
  const btns=document.querySelectorAll('#grpdet-ct .btn');
  if(btns[0])btns[0].className=`btn ${ATT_VIEW==='month'?'bp':'bg'}`;
  if(btns[1])btns[1].className=`btn ${ATT_VIEW==='day'?'bp':'bg'}`;

  const vct=document.getElementById('att-view-ct');
  if(!vct)return;
  const byS=ATT_CACHE||{};
  const names=Object.keys(byS);
  if(!names.length){vct.innerHTML='<div class="empty"><div class="ei">📋</div>Davomat yo\'q</div>';return;}

  if(ATT_VIEW==='month'){
    // ── OYLIK MATRITSA: o'quvchi × kunlar ──
    const allDates=[...new Set(Object.values(byS).flat().map(d=>d.date))].sort();
    const thDates=allDates.map(dt=>{
      const dw=new Date(dt+'T00:00:00').getDay();
      const dn=['Ya','Du','Se','Ch','Pa','Ju','Sh'][dw];
      return`<th style="font-size:9px;text-align:center;padding:3px 1px;min-width:28px"><div style="font-weight:700">${dt.slice(8)}</div><div style="color:var(--tx2);font-size:8px">${dn}</div></th>`;
    }).join('');
    const tbRows=names.map((nm,i)=>{
      const days=byS[nm];
      const prs=days.filter(d=>d.status==='Kelgan'||d.status==='present').length;
      const pct=days.length?Math.round(prs/days.length*100):0;
      const col=pct>=80?'#34d399':pct>=50?'#fbbf24':'#f87171';
      const dayMap={};days.forEach(d=>dayMap[d.date]=d.status);
      const cells=allDates.map(dt=>{
        const st=dayMap[dt];
        if(!st)return`<td style="text-align:center;color:var(--tx3);font-size:10px">·</td>`;
        const ok=st==='Kelgan'||st==='present';
        return`<td style="text-align:center;font-size:13px">${ok?'✅':'❌'}</td>`;
      }).join('');
      return`<tr style="${i%2?'background:rgba(255,255,255,.02)':''}"><td style="font-size:11px;font-weight:700;white-space:nowrap;padding:6px 8px">${i+1}. ${nm}</td>${cells}<td style="font-weight:800;color:${col};white-space:nowrap;padding:6px 8px;text-align:center">${prs}/${days.length}<br><span style="font-size:9px">${pct}%</span></td></tr>`;
    }).join('');
    vct.innerHTML=`<div style="overflow-x:auto;border-radius:10px;border:1px solid var(--bd)"><table style="font-size:11px;width:100%;border-collapse:collapse"><thead style="background:var(--card2)"><tr><th style="text-align:left;padding:6px 8px;white-space:nowrap">O'quvchi</th>${thDates}<th style="padding:4px 6px;white-space:nowrap">Natija</th></tr></thead><tbody>${tbRows}</tbody></table></div>`;
  } else {
    // ── KUNLIK KO'RINISH: tanlangan kunda kim kelgan ──
    const selDate=ATT_DAY;
    // Tanlangan kun oy ichida ekanini tekshirish
    const selMonth=selDate.slice(0,7);
    if(selMonth!==CUR_MONTH){
      // Oyni moslaymiz
      CUR_MONTH=selMonth;
    }
    const dayOfWeek=['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'][new Date(selDate+'T00:00:00').getDay()];
    const present=[], absent=[], nodata=[];
    names.forEach(nm=>{
      const days=byS[nm];
      const rec=days.find(d=>d.date===selDate);
      if(!rec) nodata.push(nm);
      else if(rec.status==='Kelgan'||rec.status==='present') present.push(nm);
      else absent.push(nm);
    });
    const mkList=(arr,ic,col)=>arr.length
      ?arr.map((nm,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--bd)"><span style="font-size:16px">${ic}</span><span style="font-size:12px;font-weight:600">${i+1}. ${nm}</span></div>`).join('')
      :'';
    vct.innerHTML=`
      <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--ac)">📆 ${selDate} — ${dayOfWeek}</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div style="flex:1;background:rgba(16,185,129,.1);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:800;color:#34d399">${present.length}</div><div style="font-size:10px;color:var(--tx2)">Keldi</div></div>
        <div style="flex:1;background:rgba(239,68,68,.1);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:800;color:#f87171">${absent.length}</div><div style="font-size:10px;color:var(--tx2)">Kelmadi</div></div>
        ${nodata.length?`<div style="flex:1;background:rgba(255,255,255,.05);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--tx3)">${nodata.length}</div><div style="font-size:10px;color:var(--tx2)">Belgilanmagan</div></div>`:''}
      </div>
      ${present.length?`<div style="border-radius:10px;border:1px solid rgba(16,185,129,.3);overflow:hidden;margin-bottom:10px"><div style="background:rgba(16,185,129,.1);padding:8px 10px;font-size:11px;font-weight:700;color:#34d399">✅ Keldi (${present.length} ta)</div>${mkList(present,'✅','#34d399')}</div>`:''}
      ${absent.length?`<div style="border-radius:10px;border:1px solid rgba(239,68,68,.3);overflow:hidden;margin-bottom:10px"><div style="background:rgba(239,68,68,.1);padding:8px 10px;font-size:11px;font-weight:700;color:#f87171">❌ Kelmadi (${absent.length} ta)</div>${mkList(absent,'❌','#f87171')}</div>`:''}
      ${nodata.length?`<div style="border-radius:10px;border:1px solid var(--bd);overflow:hidden"><div style="background:var(--card2);padding:8px 10px;font-size:11px;font-weight:700;color:var(--tx2)">— Belgilanmagan (${nodata.length} ta)</div>${mkList(nodata,'—','var(--tx2)')}</div>`:''}
    `;
  }
}

// ── ADD STUDENT ──
function openAddStd(gid){
  document.getElementById('as-gid').value=gid;
  document.getElementById('as-name').value='';
  document.getElementById('as-phone').value='';
  oMod('mod-addstd');
}
async function doAddStd(){
  const gid=parseInt(document.getElementById('as-gid').value);
  const name=document.getElementById('as-name').value.trim();
  const phone=document.getElementById('as-phone').value.trim();
  if(!name||!phone){toast("⚠️ Ism va telefon kerak",'err');return;}
  const r=await fetch(`${BASE}/teacher/api/student/add`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({group_id:gid,name,phone})}).then(x=>x.json()).catch(()=>null);
  if(r?.ok){
    toast("✅ O'quvchi qo'shildi",'ok');
    cMod('mod-addstd');
    // D dagi student_count yangilash
    const g=D.groups.find(x=>x.id===gid);if(g)g.student_count++;
    await renderGrpStudents();
  }else toast('❌ '+(r?.error||'Xatolik'),'err');
}

// ── DELETE STUDENT ──
function confirmDel(name,gid){
  _delStdName=name;_delStdGid=gid;
  document.getElementById('del-std-name').textContent=name;
  oMod('mod-delstd');
}
async function doDelStd(){
  const r=await fetch(`${BASE}/teacher/api/student/delete`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({group_id:_delStdGid,student_name:_delStdName})}).then(x=>x.json()).catch(()=>null);
  if(r?.ok){
    toast("✅ O'chirildi",'ok');cMod('mod-delstd');
    const g=D.groups.find(x=>x.id===_delStdGid);if(g&&g.student_count>0)g.student_count--;
    await renderGrpStudents();
  }else toast('❌ '+(r?.error||'Xatolik'),'err');
}

// ── PAYMENT MODAL ──
function openPayForStd(name,phone){
  openPayMod(name,phone,false,0,'');
}
function openPayMod(name,phone,paid,amount,note){
  document.getElementById('pm-gid').value=CUR_GID;
  document.getElementById('pm-name').value=name;
  document.getElementById('pm-phone').value=phone;
  document.getElementById('pm-month').value=CUR_MONTH;
  document.getElementById('pay-modal-title').textContent='💰 '+name;
  document.getElementById('pm-paid').checked=paid;
  document.getElementById('pm-amount').value=amount||'';
  document.getElementById('pm-note').value=note||'';
  document.getElementById('pm-amount-row').style.display=paid?'block':'none';
  oMod('mod-pay');
}
function pmToggle(){
  const paid=document.getElementById('pm-paid').checked;
  document.getElementById('pm-amount-row').style.display=paid?'block':'none';
}
async function savePay(){
  const gid=parseInt(document.getElementById('pm-gid').value);
  const name=document.getElementById('pm-name').value;
  const phone=document.getElementById('pm-phone').value;
  const month=document.getElementById('pm-month').value;
  const paid=document.getElementById('pm-paid').checked;
  const amount=parseInt(document.getElementById('pm-amount').value||0);
  const note=document.getElementById('pm-note').value.trim();
  const r=await fetch(`${BASE}/teacher/api/payment/save`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({group_id:gid,student_name:name,student_phone:phone,month,paid,amount,note})}).then(x=>x.json()).catch(()=>null);
  if(r?.ok){
    toast('✅ Saqlandi','ok');cMod('mod-pay');
    if(tg?.HapticFeedback)tg.HapticFeedback.notificationOccurred('success');
    await loadGrpTab(CUR_TAB);
  }else toast('❌ '+(r?.error||'Xatolik'),'err');
}

// ── PROFILE ──
let _profPhotoUrl = null;

async function loadProfilePhoto(){
  try{
    const r = await fetch(`${BASE}/teacher/api/profile/photo?user_id=${UID}`);
    const data = await r.json();
    if(data.ok && data.url) _profPhotoUrl = data.url;
  }catch(e){}
}

function renderProfile(){
  try{
    if(!D)return;
    const u=D.user,s=D.stats;
    const profLd=document.getElementById('prof-ld');
    const profCt=document.getElementById('prof-ct');
    if(profLd)profLd.style.display='none';
    if(!profCt)return;
    profCt.style.display='block';
    const c=AVC[(UID||0)%AVC.length];
    const avHtml = _profPhotoUrl
      ? `<img src="${_profPhotoUrl}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid ${c}55;margin:0 auto 10px;display:block" onerror="this.style.display='none';document.getElementById('prof-av-fallback').style.display='flex'">`
      : '';
    const avFallback = `<div id="prof-av-fallback" class="prof-av" style="background:${c}22;color:${c};border:2px solid ${c}44;${_profPhotoUrl?'display:none':''}">${ini(u?.name)}</div>`;
    
    profCt.innerHTML=`
      <div class="prof-card" style="position:relative">
        <button type="button" id="edit-profile-btn" style="position:absolute;top:12px;right:12px;background:rgba(255,255,255,.08);border:1px solid var(--bd2);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;color:var(--tx2);cursor:pointer;font-family:'Inter',sans-serif;z-index:10">✏️ ${t('edit')}</button>
        ${avHtml}${avFallback}
        <div class="prof-name">${u?.name||'—'}</div>
        <div class="prof-spec">${u?.specialty||t('teacher')}</div>
        <div style="margin-top:8px"><span class="b bok">✅ ${t('active')}</span></div>
      </div>
      <div class="card">
        <div class="card-hdr"><span class="card-title">📊 ${t('thisMonthStats')}</span></div>
        <div class="card-body">
          <div class="toggle-row"><span class="toggle-lbl">📅 ${t('monthlyAtt')}</span><span style="font-weight:800;color:var(--ac)">${s?.month||0}</span></div>
          <div class="toggle-row"><span class="toggle-lbl">📊 ${t('totalAtt')}</span><span style="font-weight:800;color:var(--ac)">${s?.total||0}</span></div>
          <div class="toggle-row"><span class="toggle-lbl">📚 ${t('groupsCount')}</span><span style="font-weight:800;color:var(--ac)">${s?.groups||0}</span></div>
        </div>
      </div>`;
    
    // Telegram WebApp uchun - kechiktirilgan event listener
    setTimeout(function(){
      var btn = document.getElementById('edit-profile-btn');
      if(btn){
        btn.addEventListener('click', function(e){ e.preventDefault(); openEditProfile(); });
        btn.addEventListener('touchstart', function(e){ e.preventDefault(); openEditProfile(); }, {passive: false});
      }
    }, 100);
  }catch(e){console.error('renderProfile error:',e);}
}

// ── SETTINGS ──
function renderSettings(){
  try{
    const settingsCt=document.getElementById('settings-ct');
    if(!settingsCt)return;
    const u=D?.user||{};
    const lang=D?.user?.language||'uz';
    settingsCt.innerHTML=`
      <div class="card" style="margin-bottom:11px">
        <div class="card-hdr"><span class="card-title">🌐 Til / Язык</span></div>
        <div class="card-body">
          <div style="display:flex;gap:8px">
            <button type="button" id="lang-uz-btn" style="flex:1;padding:12px;border-radius:10px;border:2px solid ${lang==='uz'?'var(--ac)':'var(--bd)'};background:${lang==='uz'?'rgba(79,142,247,.15)':'var(--card2)'};color:var(--tx);font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer">
              🇺🇿 O'zbekcha
            </button>
            <button type="button" id="lang-ru-btn" style="flex:1;padding:12px;border-radius:10px;border:2px solid ${lang==='ru'?'var(--ac)':'var(--bd)'};background:${lang==='ru'?'rgba(79,142,247,.15)':'var(--card2)'};color:var(--tx);font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer">
              🇷🇺 Русский
            </button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><span class="card-title">📋 ${lang==='ru'?'Филиалы':'Filiallar'}</span></div>
        <div style="max-height:300px;overflow-y:auto">
          ${(D?.branches||[]).map((b,i)=>`
            <div class="br-item">
              <div class="br-num">${i+1}</div>
              <div class="br-info"><div class="br-name">${b?.name||''}</div></div>
              <a href="https://yandex.com/maps/?pt=${b?.lon||0},${b?.lat||0}&z=17" target="_blank" class="btn bg" style="font-size:10px;padding:5px 10px">${lang==='ru'?'Карта ↗':'Xarita ↗'}</a>
            </div>`).join('')}
        </div>
      </div>`;
    // Telegram WebApp uchun - kechiktirilgan event listener
    setTimeout(function(){
      var uzBtn = document.getElementById('lang-uz-btn');
      var ruBtn = document.getElementById('lang-ru-btn');
      if(uzBtn){
        uzBtn.addEventListener('click', function(e){ e.preventDefault(); changeLang('uz'); });
        uzBtn.addEventListener('touchstart', function(e){ e.preventDefault(); changeLang('uz'); }, {passive: false});
      }
      if(ruBtn){
        ruBtn.addEventListener('click', function(e){ e.preventDefault(); changeLang('ru'); });
        ruBtn.addEventListener('touchstart', function(e){ e.preventDefault(); changeLang('ru'); }, {passive: false});
      }
    }, 100);
  }catch(e){console.error('renderSettings error:',e);}
}

async function changeLang(lang){
  try{
    const r=await fetch(`${BASE}/teacher/api/lang/change`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:UID,lang})
    }).then(x=>x.json()).catch(()=>null);
    if(r?.ok){
      if(D?.user)D.user.language=lang;
      toast(lang==='ru'?'✅ Язык изменен':'✅ Til o\'zgartirildi','ok');
      renderNav();renderSettings();renderProfile();renderStats();renderSched();renderGroups();
      if(tg?.HapticFeedback)tg.HapticFeedback.notificationOccurred('success');
    }else{
      toast('❌ '+(r?.error||'Xatolik'),'err');
    }
  }catch(e){
    console.error('changeLang error:',e);
    toast('❌ Xatolik','err');
  }
}

// ── PROFILE EDIT ──
function openEditProfile(){
  console.log('Open Edit Profile called');
  if(!D || !D.user){
    toast('❌ Ma\'lumot yuklanmadi','err');
    return;
  }
  
  const nameInput = document.getElementById('ep-name');
  const specInput = document.getElementById('ep-spec');
  
  if(nameInput && specInput){
    nameInput.value = D.user.name || '';
    specInput.value = D.user.specialty || 'IT';
    oMod('mod-editprof');
  } else {
    console.error('Inputs not found in DOM');
  }
}

async function saveProfile(){
  try {
    console.log('[saveProfile] Starting...', {UID});
    const name=document.getElementById('ep-name').value.trim();
    const spec=document.getElementById('ep-spec').value;
    console.log('[saveProfile] Values:', {name, spec});
    
    if(!name||name.length<3){toast('⚠️ Ism kamida 3 harf','err');return;}
    if(!UID){toast('⚠️ Foydalanuvchi aniqlanmadi','err');console.error('[saveProfile] UID is null');return;}
    
    console.log('[saveProfile] Sending request...');
    const r=await fetch(`${BASE}/teacher/api/profile/update`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:UID,name,specialty:spec})
    }).then(x=>x.json()).catch(e=>{console.error('[saveProfile] Fetch error:',e);return null;});
    
    console.log('[saveProfile] Response:', r);
    if(r?.ok){
      D.user.name=r.name;D.user.specialty=r.specialty;
      toast('✅ Profil yangilandi','ok');
      cMod('mod-editprof');
      renderProfile();renderStats();
      if(tg?.HapticFeedback)tg.HapticFeedback.notificationOccurred('success');
    }else{
      console.error('[saveProfile] Error response:', r);
      toast('❌ '+(r?.error||'Xatolik'),'err');
    }
  } catch(e) {
    console.error('[saveProfile] Exception:', e);
    toast('❌ Xatolik: '+e.message,'err');
  }
}
