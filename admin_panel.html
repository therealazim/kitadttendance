<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITA Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #0f1724; color: #edf2ff; padding: 16px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        h1 { font-size: 24px; color: #4f8ef7; display: flex; align-items: center; gap: 8px; }
        .status-bar { display: flex; gap: 12px; align-items: center; }
        .status { background: #1a2332; padding: 8px 16px; border-radius: 8px; font-size: 13px; color: #8899b0; }
        button { background: #4f8ef7; border: none; padding: 8px 16px; border-radius: 8px; color: white; cursor: pointer; font-size: 13px; font-weight: 500; }
        button:hover { background: #3a7de0; }
        
        /* Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #1a2332; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #2d3a4a; }
        .stat-value { font-size: 32px; font-weight: bold; color: #4f8ef7; }
        .stat-label { font-size: 12px; color: #8899b0; margin-top: 8px; }
        
        /* Tables */
        .card { background: #1a2332; border-radius: 12px; margin-bottom: 24px; border: 1px solid #2d3a4a; overflow: hidden; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid #2d3a4a; }
        .card-header h2 { font-size: 18px; color: #4f8ef7; display: flex; align-items: center; gap: 8px; }
        .table-wrapper { overflow-x: auto; padding: 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #2d3a4a; }
        th { background: #212f42; color: #4f8ef7; font-weight: 600; font-size: 13px; }
        td { font-size: 13px; }
        tr:hover { background: #1e2a3a; }
        
        /* Badges */
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
        .badge-active { background: #10b98120; color: #10b981; }
        .badge-blocked { background: #ef444420; color: #ef4444; }
        .badge-IT { background: #4f8ef720; color: #4f8ef7; }
        .badge-Koreys\ tili { background: #8b5cf620; color: #a78bfa; }
        .badge-Ofis\ xodimi { background: #f59e0b20; color: #fbbf24; }
        
        /* Loading & Error */
        .loading { text-align: center; padding: 40px; color: #8899b0; }
        .error { background: #ef444420; color: #ef4444; padding: 20px; border-radius: 12px; text-align: center; margin: 20px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 4px; padding: 0 20px; border-bottom: 1px solid #2d3a4a; }
        .tab { background: none; border: none; padding: 12px 20px; color: #8899b0; cursor: pointer; font-size: 13px; border-radius: 8px 8px 0 0; }
        .tab.active { color: #4f8ef7; border-bottom: 2px solid #4f8ef7; background: #212f42; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Logs */
        .debug-log { background: #0a0f17; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 11px; margin-top: 16px; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 KITA Admin Panel</h1>
        <div class="status-bar">
            <span class="status" id="statusText">Yuklanmoqda...</span>
            <button onclick="loadAllData()">🔄 Yangilash</button>
        </div>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Foydalanuvchilar</div></div>
        <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Guruhlar</div></div>
        <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Bugungi davomat</div></div>
        <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Filiallar</div></div>
    </div>
    
    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="showTab('users')">👥 Foydalanuvchilar</button>
            <button class="tab" onclick="showTab('groups')">📚 Guruhlar</button>
            <button class="tab" onclick="showTab('attendance')">📍 Bugungi davomat</button>
        </div>
        
        <div id="tab-users" class="tab-content active">
            <div class="table-wrapper">
                <div id="usersTable" class="loading">Yuklanmoqda...</div>
            </div>
        </div>
        
        <div id="tab-groups" class="tab-content">
            <div class="table-wrapper">
                <div id="groupsTable" class="loading">Yuklanmoqda...</div>
            </div>
        </div>
        
        <div id="tab-attendance" class="tab-content">
            <div class="table-wrapper">
                <div id="attendanceTable" class="loading">Yuklanmoqda...</div>
            </div>
        </div>
    </div>
    
    <div class="debug-log" id="debugLog">
        [DEBUG] Sahifa yuklandi
    </div>
</div>

<script>
// Debug log
function debug(msg) {
    const logDiv = document.getElementById('debugLog');
    if (logDiv) {
        logDiv.innerHTML += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    console.log(msg);
}

debug('Script boshlandi');

// Global data
let appData = null;

// Tab switching
function showTab(tabName) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    
    if (tabName === 'users') {
        document.querySelector('.tab').classList.add('active');
        document.getElementById('tab-users').classList.add('active');
    } else if (tabName === 'groups') {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('tab-groups').classList.add('active');
    } else if (tabName === 'attendance') {
        document.querySelectorAll('.tab')[2].classList.add('active');
        document.getElementById('tab-attendance').classList.add('active');
    }
}

// Format number
function formatNumber(n) {
    return n ? n.toLocaleString() : '0';
}

// Render users table
function renderUsers(users) {
    if (!users || users.length === 0) {
        document.getElementById('usersTable').innerHTML = '<div class="loading">Hech qanday foydalanuvchi topilmadi</div>';
        return;
    }
    
    const html = `
        <table>
            <thead>
                <tr><th>ID</th><th>Ism</th><th>Mutaxassislik</th><th>Bu oy</th><th>Holat</th></tr>
            </thead>
            <tbody>
                ${users.map(u => `
                    <tr>
                        <td>${u.user_id}</td>
                        <td><strong>${u.name || '-'}</strong></td>
                        <td><span class="badge badge-${u.specialty || 'active'}">${u.specialty || '-'}</span></td>
                        <td>${u.attendance_count || 0}</td>
                        <td><span class="badge badge-${u.status === 'active' ? 'active' : 'blocked'}">${u.status === 'active' ? 'Faol' : u.status}</span></td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
    document.getElementById('usersTable').innerHTML = html;
}

// Render groups table
function renderGroups(groups) {
    if (!groups || groups.length === 0) {
        document.getElementById('groupsTable').innerHTML = '<div class="loading">Hech qanday guruh topilmadi</div>';
        return;
    }
    
    const html = `
        <table>
            <thead>
                <tr><th>ID</th><th>Guruh nomi</th><th>Filial</th><th>Fan</th><th>O'qituvchi</th><th>O'quvchilar</th></tr>
            </thead>
            <tbody>
                ${groups.map(g => `
                    <tr>
                        <td>${g.id}</td>
                        <td><strong>${g.group_name || '-'}</strong></td>
                        <td>${g.branch || '-'}</td>
                        <td><span class="badge badge-${g.lesson_type || 'active'}">${g.lesson_type || '-'}</span></td>
                        <td>${g.teacher_name || '-'}</td>
                        <td>${g.student_count || 0}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
    document.getElementById('groupsTable').innerHTML = html;
}

// Render attendance table
function renderAttendance(attendance, users) {
    if (!attendance || attendance.length === 0) {
        document.getElementById('attendanceTable').innerHTML = '<div class="loading">Bugun davomat yo\'q</div>';
        return;
    }
    
    // Create user map for quick lookup
    const userMap = {};
    if (users) {
        users.forEach(u => { userMap[u.user_id] = u; });
    }
    
    const html = `
        <table>
            <thead>
                <tr><th>O'qituvchi</th><th>Fan</th><th>Filial</th><th>Vaqt</th></tr>
            </thead>
            <tbody>
                ${attendance.map(a => {
                    const user = userMap[a.user_id] || {};
                    return `
                        <tr>
                            <td><strong>${user.name || a.user_id}</strong></td>
                            <td><span class="badge badge-${user.specialty || 'active'}">${user.specialty || '-'}</span></td>
                            <td>${a.branch || '-'}</td>
                            <td>${a.time || '-'}</td>
                        </tr>
                    `;
                }).join('')}
            </tbody>
        </table>
    `;
    document.getElementById('attendanceTable').innerHTML = html;
}

// Update stats
function updateStats(users, groups, attendance, branches) {
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-value">${users?.length || 0}</div><div class="stat-label">Foydalanuvchilar</div></div>
        <div class="stat-card"><div class="stat-value">${groups?.length || 0}</div><div class="stat-label">Guruhlar</div></div>
        <div class="stat-card"><div class="stat-value">${attendance?.length || 0}</div><div class="stat-label">Bugungi davomat</div></div>
        <div class="stat-card"><div class="stat-value">${branches?.length || 0}</div><div class="stat-label">Filiallar</div></div>
    `;
}

// Main load function
async function loadAllData() {
    debug('loadAllData() boshlandi');
    document.getElementById('statusText').textContent = 'Yuklanmoqda...';
    
    try {
        debug('Fetching /admin/api/data...');
        const response = await fetch('/admin/api/data');
        debug(`Response status: ${response.status}`);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const text = await response.text();
        debug(`Response length: ${text.length} bytes`);
        
        appData = JSON.parse(text);
        debug('JSON parse successful');
        
        const users = appData.users || [];
        const groups = appData.groups || [];
        const attendance = appData.today_attendance || [];
        const branches = appData.branches || [];
        
        debug(`Users: ${users.length}, Groups: ${groups.length}, Attendance: ${attendance.length}, Branches: ${branches.length}`);
        
        updateStats(users, groups, attendance, branches);
        renderUsers(users);
        renderGroups(groups);
        renderAttendance(attendance, users);
        
        document.getElementById('statusText').textContent = `Yangilandi: ${new Date().toLocaleTimeString()}`;
        debug('loadAllData() tugadi');
        
    } catch(e) {
        debug(`XATOLIK: ${e.message}`);
        document.getElementById('statusText').textContent = `Xatolik: ${e.message}`;
        document.getElementById('usersTable').innerHTML = `<div class="error">❌ Xatolik: ${e.message}</div>`;
        document.getElementById('groupsTable').innerHTML = `<div class="error">❌ Xatolik: ${e.message}</div>`;
        document.getElementById('attendanceTable').innerHTML = `<div class="error">❌ Xatolik: ${e.message}</div>`;
    }
}

// Auto-refresh every 60 seconds
setInterval(() => {
    loadAllData();
}, 60000);

// Start
debug('DOMContentLoaded - loadAllData() chaqirilmoqda');
document.addEventListener('DOMContentLoaded', loadAllData);
</script>
</body>
</html>
